<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela de Jogos - BolГЈo da Copa 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- NavegaГ§ГЈo -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-logo">
                <span class="logo-icon">вҡҪ</span>
                <span class="logo-text">BolГЈo SKY FIT</span>
            </div>
            <ul class="nav-menu">
                <li class="nav-item"><a href="index.html" class="nav-link">InГӯcio</a></li>
                <li class="nav-item"><a href="palpites.html" class="nav-link">Palpitar</a></li>
                <li class="nav-item"><a href="ranking.html" class="nav-link">Ranking</a></li>
                <li class="nav-item"><a href="tabela.html" class="nav-link active">Tabela</a></li>
            </ul>
        </div>
    </nav>

    <!-- ConteГәdo Principal -->
    <main class="main-content">
        <div class="container">
            <h1 class="page-title">Tabela de Jogos</h1>
            <p class="page-subtitle">Confira todos os jogos da Copa do Mundo 2026</p>

            <!-- Filtros -->
            <div class="filter-section">
                <button class="btn btn-filter active" data-filter="todos">Todos</button>
                <button class="btn btn-filter" data-filter="proximos">PrГіximos</button>
                <button class="btn btn-filter" data-filter="encerrados">Encerrados</button>
                <button class="btn btn-filter" data-filter="grupo-a">Grupo A</button>
                <button class="btn btn-filter" data-filter="grupo-b">Grupo B</button>
                <button class="btn btn-filter" data-filter="grupo-c">Grupo C</button>
                <button class="btn btn-filter" data-filter="grupo-d">Grupo D</button>
            </div>

            <!-- Jogos -->
            <div id="games-container" class="games-container">
                <!-- Gerado por JavaScript -->
            </div>
        </div>
    </main>

    <!-- RodapГ© -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 BolГЈo da Copa SKY FIT Academia. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        let currentFilter = 'todos';

        document.addEventListener('DOMContentLoaded', function() {
            loadGamesTable();
            setupFilters();
        });

        function setupFilters() {
            document.querySelectorAll('.btn-filter').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentFilter = this.dataset.filter;
                    loadGamesTable();
                });
            });
        }

        function loadGamesTable() {
            const games = loadFromLocalStorage('jogos') || [];
            const now = new Date();

            let filtered = games;

            if (currentFilter === 'proximos') {
                filtered = games.filter(g => new Date(g.data) > now && !g.resultado);
            } else if (currentFilter === 'encerrados') {
                filtered = games.filter(g => g.resultado);
            } else if (currentFilter.startsWith('grupo-')) {
                const grupo = currentFilter.split('-')[1].toUpperCase();
                filtered = games.filter(g => g.grupo === grupo);
            }

            const container = document.getElementById('games-container');
            
            if (filtered.length === 0) {
                container.innerHTML = '<p class="text-center">Nenhum jogo encontrado.</p>';
                return;
            }

            // Agrupar por grupo
            const grouped = {};
            filtered.forEach(game => {
                if (!grouped[game.grupo]) {
                    grouped[game.grupo] = [];
                }
                grouped[game.grupo].push(game);
            });

            container.innerHTML = Object.entries(grouped).map(([grupo, jogos]) => `
                <div class="games-group">
                    <h2 class="group-title">Grupo ${grupo}</h2>
                    <div class="games-list">
                        ${jogos.map(game => renderGameCard(game)).join('')}
                    </div>
                </div>
            `).join('');
        }

        function renderGameCard(game) {
            const gameDate = new Date(game.data);
            const now = new Date();
            const isUpcoming = gameDate > now && !game.resultado;
            const isFinished = game.resultado;

            const formattedDate = gameDate.toLocaleDateString('pt-BR', {
                weekday: 'short',
                month: '2-digit',
                day: '2-digit'
            });

            const formattedTime = gameDate.toLocaleTimeString('pt-BR', {
                hour: '2-digit',
                minute: '2-digit'
            });

            let scoreHTML = '';
            if (isFinished) {
                const [placarA, placarB] = game.resultado.split('x').map(s => s.trim());
                scoreHTML = `<div class="game-score-finished">${placarA} <span class="score-sep">x</span> ${placarB}</div>`;
            } else if (isUpcoming) {
                scoreHTML = `<div class="game-score-upcoming"><a href="palpites.html?jogo=${game.id}" class="btn btn-sm btn-primary">Palpitar</a></div>`;
            } else {
                scoreHTML = `<div class="game-score-live">AO VIVO</div>`;
            }

            return `
                <div class="game-card ${isFinished ? 'finished' : isUpcoming ? 'upcoming' : 'live'}">
                    <div class="game-date-time">
                        <span class="game-date">${formattedDate}</span>
                        <span class="game-time">${formattedTime}</span>
                    </div>
                    <div class="game-content">
                        <div class="team team-a">
                            <span class="team-flag">${getCountryFlag(game.time_a)}</span>
                            <span class="team-name">${game.time_a}</span>
                        </div>
                        ${scoreHTML}
                        <div class="team team-b">
                            <span class="team-flag">${getCountryFlag(game.time_b)}</span>
                            <span class="team-name">${game.time_b}</span>
                        </div>
                    </div>
                    <div class="game-location">рҹ“Қ ${game.local}</div>
                </div>
            `;
        }

        function getCountryFlag(country) {
            const flags = {
                'Argentina': 'рҹҮҰрҹҮ·', 'Brasil': 'рҹҮ§рҹҮ·', 'CanadГЎ': 'рҹҮЁрҹҮҰ', 'MГ©xico': 'рҹҮІрҹҮҪ',
                'Estados Unidos': 'рҹҮәрҹҮё', 'Uruguai': 'рҹҮәрҹҮҫ', 'Paraguai': 'рҹҮөрҹҮҫ', 'ColГҙmbia': 'рҹҮЁрҹҮҙ',
                'Peru': 'рҹҮөрҹҮӘ', 'Equador': 'рҹҮӘрҹҮЁ', 'BolГӯvia': 'рҹҮ§рҹҮҙ', 'Chile': 'рҹҮЁрҹҮұ',
                'Venezuela': 'рҹҮ»рҹҮӘ', 'PanamГЎ': 'рҹҮөрҹҮҰ', 'Jamaica': 'рҹҮҜрҹҮІ', 'Honduras': 'рҹҮӯрҹҮі',
                'FranГ§a': 'рҹҮ«рҹҮ·', 'Espanha': 'рҹҮӘрҹҮё', 'ItГЎlia': 'рҹҮ®рҹҮ№', 'Alemanha': 'рҹҮ©рҹҮӘ',
                'Holanda': 'рҹҮірҹҮұ', 'BГ©lgica': 'рҹҮ§рҹҮӘ', 'Portugal': 'рҹҮөрҹҮ№', 'PolГҙnia': 'рҹҮөрҹҮұ',
                'SuГӯГ§a': 'рҹҮЁрҹҮӯ', 'ГҒustria': 'рҹҮҰрҹҮ№', 'RepГәblica Tcheca': 'рҹҮЁрҹҮҝ', 'Hungria': 'рҹҮӯрҹҮә',
                'RomГӘnia': 'рҹҮ·рҹҮҙ', 'SГ©rvia': 'рҹҮ·рҹҮё', 'CroГЎcia': 'рҹҮӯрҹҮ·', 'GrГ©cia': 'рҹҮ¬рҹҮ·',
                'IslГўndia': 'рҹҮ®рҹҮё', 'Dinamarca': 'рҹҮ©рҹҮ°', 'SuГ©cia': 'рҹҮёрҹҮӘ', 'Noruega': 'рҹҮірҹҮҙ',
                'Irlanda': 'рҹҮ®рҹҮӘ', 'Israel': 'рҹҮ®рҹҮұ', 'ArГЎbia Saudita': 'рҹҮёрҹҮҰ', 'IrГЈ': 'рҹҮ®рҹҮ·',
                'Iraque': 'рҹҮ®рҹҮ¶', 'SГӯria': 'рҹҮёрҹҮҫ', 'LГӯbano': 'рҹҮұрҹҮ§', 'JordГўnia': 'рҹҮҜрҹҮҙ',
                'Emirados ГҒrabes Unidos': 'рҹҮҰрҹҮӘ', 'Qatar': 'рҹҮ¶рҹҮҰ', 'OmГЈ': 'рҹҮҙрҹҮІ', 'Bahrein': 'рҹҮ§рҹҮӯ',
                'CorГ©ia do Sul': 'рҹҮ°рҹҮ·', 'JapГЈo': 'рҹҮҜрҹҮө', 'China': 'рҹҮЁрҹҮі',
                'TailГўndia': 'рҹҮ№рҹҮӯ', 'VietnГЈ': 'рҹҮ»рҹҮі', 'IndonГ©sia': 'рҹҮ®рҹҮ©', 'MalГЎsia': 'рҹҮІрҹҮҫ',
                'Singapura': 'рҹҮёрҹҮ¬', 'AustrГЎlia': 'рҹҮҰрҹҮә', 'Nova ZelГўndia': 'рҹҮірҹҮҝ',
                'Egito': 'рҹҮӘрҹҮ¬', 'ГҒfrica do Sul': 'рҹҮҝрҹҮҰ', 'NigГ©ria': 'рҹҮірҹҮ¬', 'CamarГөes': 'рҹҮЁрҹҮІ',
                'Gana': 'рҹҮ¬рҹҮӯ', 'Senegal': 'рҹҮёрҹҮі', 'TunГӯsia': 'рҹҮ№рҹҮі',
                'Marrocos': 'рҹҮІрҹҮҰ', 'ArgГ©lia': 'рҹҮ©рҹҮҝ', 'Costa Rica': 'рҹҮЁрҹҮ·', 'Inglaterra': 'рҹҸҙу Ғ§у Ғўу ҒҘу Ғ®у Ғ§у Ғҝ'
            };
            return flags[country] || 'рҹҸіпёҸ';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela de Jogos - Bolão Online</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navegação -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <span class="logo-emoji">⚽</span>
                <span class="logo-text">Bolão Online</span>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Início</a></li>
                <li><a href="palpites.html" class="nav-link">Palpites</a></li>
                <li><a href="ranking.html" class="nav-link">Ranking</a></li>
                <li><a href="tabela.html" class="nav-link active">Tabela</a></li>
                <li><a href="admin.html" class="nav-link">Admin</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <h1 class="page-title">Tabela de Jogos</h1>

            <!-- Filtros -->
            <div class="filter-section">
                <button class="filter-btn active" data-filter="todos">Todos</button>
                <button class="filter-btn" data-filter="Fase de Grupos">Fase de Grupos</button>
                <button class="filter-btn" data-filter="Oitavas">Oitavas</button>
                <button class="filter-btn" data-filter="Quartas">Quartas</button>
                <button class="filter-btn" data-filter="Semifinal">Semifinal</button>
                <button class="filter-btn" data-filter="Terceiro Lugar">Terceiro Lugar</button>
                <button class="filter-btn" data-filter="Final">Final</button>
            </div>

            <!-- Jogos -->
            <div id="jogos-container" class="jogos-container">
                <p class="text-center text-muted">Nenhum jogo cadastrado ainda.</p>
            </div>
        </div>
    </main>

    <!-- Rodapé -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Bolão Online. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        let filtroAtual = 'todos';

        document.addEventListener('DOMContentLoaded', function() {
            carregarTabela();
            setupFiltrosTabela();
        });

        function setupFiltrosTabela() {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    filtroAtual = this.dataset.filter;
                    carregarTabela();
                });
            });
        }

        function carregarTabela() {
            const jogos = obterDados('jogos') || [];
            const container = document.getElementById('jogos-container');

            // Filtrar jogos
            let jogosFiltrando = jogos;
            if (filtroAtual !== 'todos') {
                jogosFiltrando = jogos.filter(j => j.fase === filtroAtual);
            }

            if (jogosFiltrando.length === 0) {
                container.innerHTML = '<p class="text-center text-muted">Nenhum jogo encontrado nesta fase.</p>';
                return;
            }

            // Agrupar por fase
            const agrupado = {};
            jogosFiltrando.forEach(jogo => {
                if (!agrupado[jogo.fase]) {
                    agrupado[jogo.fase] = [];
                }
                agrupado[jogo.fase].push(jogo);
            });

            // Renderizar
            let html = '';
            Object.entries(agrupado).forEach(([fase, jogos]) => {
                html += `
                    <div class="phase-section">
                        <h2 class="phase-title">${fase}</h2>
                        <div class="games-grid">
                            ${jogos.map(jogo => renderizarCartaoJogo(jogo)).join('')}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function renderizarCartaoJogo(jogo) {
            const dataJogo = new Date(jogo.data + 'T' + jogo.hora);
            const agora = new Date();
            const jaFezou = dataJogo <= agora;

            const dataFormatada = dataJogo.toLocaleDateString('pt-BR', {
                weekday: 'short',
                month: '2-digit',
                day: '2-digit'
            });

            const horaFormatada = dataJogo.toLocaleTimeString('pt-BR', {
                hour: '2-digit',
                minute: '2-digit'
            });

            let placarHtml = '';
            if (jogo.resultado) {
                placarHtml = `<div class="jogo-placar-final">${jogo.resultado}</div>`;
            } else if (jaFezou) {
                placarHtml = `<div class="jogo-ao-vivo">AO VIVO</div>`;
            } else {
                placarHtml = `<div class="jogo-vs">vs</div>`;
            }

            return `
                <div class="jogo-card ${jogo.resultado ? 'finalizado' : jaFezou ? 'ao-vivo' : 'proximo'}">
                    <div class="jogo-header">
                        <span class="jogo-data">${dataFormatada}</span>
                        <span class="jogo-hora">${horaFormatada}</span>
                    </div>
                    <div class="jogo-body">
                        <div class="jogo-time-a">${jogo.time_a}</div>
                        ${placarHtml}
                        <div class="jogo-time-b">${jogo.time_b}</div>
                    </div>
                    <div class="jogo-footer">
                        <small>📍 ${jogo.local}</small>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
